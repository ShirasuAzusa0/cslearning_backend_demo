server:
  port: 8083
  address: 127.0.0.1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8280/eureka
spring:
  application:
    name: qihui-ai
  datasource:
    url: jdbc:mysql://localhost:3306/qihui
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: ${NDB_USER}
      password: ${NDB_PASSWORD}
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RMQ_USER}
    password: ${RMQ_PASSWORD}