server:
  port: 8082
  address: 127.0.0.1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8280/eureka
spring:
  application:
    name: qihui-post
  datasource:
    url: jdbc:mysql://localhost:3306/qihui
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true