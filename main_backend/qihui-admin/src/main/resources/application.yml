server:
  port: 8084
  address: 127.0.0.1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8280/eureka
spring:
  application:
    name: qihui-admin
  datasource:
    url: jdbc:mysql://localhost:3306/qihui
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: ${NDB_USER}
      password: ${NDB_PASSWORD}