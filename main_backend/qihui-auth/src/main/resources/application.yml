server:
  port: 8081
  address: 127.0.0.1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8280/eureka
spring:
  application:
    name: qihui-auth
  datasource:
    url: jdbc:mysql://localhost:3306/qihui
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    jwt:
      key: ab1226
      expire: 7
  data:
    redis:
      host: localhost
      port: 6379
      database: 4
      timeout: 3000